<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUBA 💛</title>
<style>
*{
    box-sizing:border-box;
}
body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    font-family:Tahoma, Arial, sans-serif;
    background:
    linear-gradient(
    180deg,
    #ffb5c5 0%,
    #ffd6a5 45%,
    #fff1b8 75%,
    #fffdf7 100%
    );
    color:#2b2b2b;
    display:flex;
    justify-content:center;
    align-items:center;
}
.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.5);
    filter:blur(120px);
    border-radius:50%;
    top:-150px;
    left:50%;
    transform:translateX(-50%);
}
.menu{
    text-align:center;
    z-index:5;
}
.menu h2{
    margin-bottom:20px;
}
button{
    padding:14px 24px;
    border:none;
    border-radius:14px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
    font-size:16px;
    box-shadow:0 8px 25px rgba(255,77,166,0.25);
}
.card{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:min(90%,700px);
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:24px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
}
#text{
    line-height:2;
    font-size:18px;
    white-space:pre-line;
}
#photosBtn{
    display:none;
    margin-top:25px;
}
.slideshow{
    display:none;
    position:absolute;
    inset:0;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.slideshow img{
    width:min(85vw,420px);
    height:min(85vw,420px);
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation:fadeImg 1s ease;
}
.caption{
    margin-top:20px;
    font-size:18px;
}
@keyframes fadeImg{
    from{
        opacity:0;
        transform:scale(.96);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="menu">
    <h2>💛 إلى رُبى</h2>
    <button onclick="openMsg()">💌 Open Message</button>
</div>
<div class="card" id="card">
<div id="text"></div>
<div id="photosBtn">
    <button onclick="openSlide()">
        📸 تركتلك كم صورة إلي... إذا يوم اشتقتيلي 💛
    </button>
</div>
</div>
<div class="slideshow" id="slide">
    <img id="img" src="image1.JPG">
    <div class="caption">
        💛 memories...
    </div>
</div>
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
<script>
const msg = `رُبى…
ما بعرف إذا هالكلمات رح توصللك بنفس الشعور اللي جواتي، بس رح أكتبها كأنك عم تقريها بقلبي مش عالشاشة…
قبل ما سافر، حسّيت إنو في شي جواتي عم ينكسر بهدوء… مش لأن السفر صعب، بس لان وجودك هو الأمان نفسه.
إنتِ كنتي أكتر من شخص حلو بحياتي…
كنتِ راحة، وطمأنينة، وضحكة بتطلع بدون سبب، واشتياق حتى وإنتِ موجودة.
ما بعرف إذا رح تجمعنا الأيام مرة تانية أو لأ…
بس بعرف إنو في جزء مني رح يضل واقف عندك، مهما راحت المسافات.
إذا يوم حسّيتي إنو في شي ناقص، أو في لحظة هدوء غريبة… تذكري إنو في حدا بعيد، بس قلبه بعدو هون، عندك إنتِ.
أنا ما بعرف شو اسم هالشعور… بس بعرف إنه صادق.
وأكتر شي بيوجعني إني ما قلتلك كل شي بوقته.
إذا كان في رجعة…
بدي أرجع وأنا نفس الشخص، بس متأكد أكتر من شعوري فيكي 💛
وتأكدي رح تضل نفس اللهفة عندي تجاهك
ديري بالك عحالك يا قلبي وتأكدي
انو محمد قد ما كان بعيد قلبو واحساسو
رح يضلو عندك ورح يضل حدك 💛`;
let i = 0;
function typeWriter(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeWriter,35);
    }else{
        document.getElementById("photosBtn").style.display = "block";
    }
}
function openMsg(){
    document.querySelector(".menu").style.display = "none";
    document.getElementById("card").style.display = "block";
    const music = document.getElementById("music");
    music.currentTime = 0;
    music.play();
    typeWriter();
}
let images = [
    "image1.JPG",
    "image2.JPG",
    "image3.JPG",
    "image4.jpg"
];
let current = 0;
function openSlide(){
    document.getElementById("card").style.display = "none";
    document.getElementById("slide").style.display = "flex";
    showImage();
    setInterval(nextImage,3000);
}
function showImage(){
    document.getElementById("img").src = images[current];
}
function nextImage(){
    current = (current + 1) % images.length;
    showImage();
}
</script>
</body>
</html>
