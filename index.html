<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUBA 💖</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    min-height:100vh;
    overflow-x:hidden;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,182,193,0.5), transparent 45%),
    radial-gradient(circle at 80% 30%, rgba(173,216,230,0.4), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(221,160,221,0.35), transparent 50%),
    linear-gradient(180deg, #0b0b14, #1a1a2e);

    color:white;
}

/* header */
header{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    font-size:30px;
    color:#ffb6c1;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#ff4da6,#c77dff);
    color:white;
    cursor:pointer;
    font-size:16px;
}

/* section */
.section{
    padding:60px 20px;
    display:none;
    max-width:800px;
    margin:auto;
}

/* text */
#text{
    white-space:pre-line;
    line-height:2.3;
    font-size:18px;
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    backdrop-filter:blur(10px);
}

/* photos button */
#photosBtn{
    display:none;
    margin-top:20px;
    text-align:center;
}

/* hearts */
.hearts{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
}

.heart{
    position:absolute;
    font-size:18px;
    animation:floatHeart linear forwards;
    opacity:0.9;
}

@keyframes floatHeart{
    from{
        transform:translateY(100vh) scale(0.8);
        opacity:0;
    }
    10%{opacity:1;}
    to{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- hearts layer -->
<div class="hearts"></div>

<header>
    <h1>💖 إلى رُبى</h1>
    <button onclick="openMsg()">💌 Open Message</button>
</header>

<div class="section" id="msgSection">

    <div id="text"></div>

    <div id="photosBtn">
        <button onclick="openPhotos()">
            📸 تركتلك كم صورة إلي إذا يوم اشتقتيلي 💖
        </button>
    </div>

</div>

<div class="gallery" id="gallery">
    <h2>💖 الصور</h2>
    <img src="image1.JPG">
    <img src="image2.JPG">
    <img src="image3.JPG">
    <img src="image4.jpg">
</div>

<audio id="music" loop>
    <source src="music.mp3">
</audio>

<script>

const msg = `رُبى…
ما بعرف إذا هالكلمات رح توصللك بنفس الشعور اللي جواتي، بس رح أكتبها كأنك عم تقريها بقلبي مش عالشاشة…
قبل ما سافر، حسّيت إنو في شي جواتي عم ينكسر بهدوء… مش لأن السفر صعب، بس لان وجودك هو الأمان نفسه.
إنتِ كنتي أكتر من شخص حلو بحياتي…
كنتِ راحة، وطمأنينة، وضحكة بتطلع بدون سبب، واشتياق حتى وإنتِ موجودة.
ما بعرف إذا رح تجمعنا الأيام مرة تانية أو لأ…
بس بعرف إنو في جزء مني رح يضل واقف عندك، مهما راحت المسافات.
إذا يوم حسّيتي إنو في شي ناقص، أو في لحظة هدوء غريبة… تذكري إنو في حدا بعيد، بس قلبه بعدو هون، عندك إنتِ.
أنا ما بعرف شو اسم هالشعور… بس بعرف إنه صادق.
وأكتر شي بيوجعني إني ما قلتلك كل شي بوقته.
إذا كان في رجعة…
بدي أرجع وأنا نفس الشخص، بس متأكد أكتر من شعوري فيكي 💖
وتأكدي رح تضل نفس اللهفة عندي تجاهك
ديري بالك عحالك يا قلبي وتأكدي
انو محمد قد ما كان بعيد قلبو واحساسو
رح يضلو عندك ورح يضل حدك 💖`;

let i = 0;

/* 💖 multi-color hearts */
const heartColors = ["💖","🤍","💜"];

function createHeart(){
    const container = document.querySelector(".hearts");

    const heart = document.createElement("div");
    heart.classList.add("heart");

    // random color heart
    heart.innerHTML = heartColors[Math.floor(Math.random()*heartColors.length)];

    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*10 + 14) + "px";
    heart.style.animationDuration = (Math.random()*3 + 3) + "s";

    container.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
}

/* ✍️ typing */
function typeWriter(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;

        if(i % 3 === 0){
            createHeart();
        }

        setTimeout(typeWriter,25);
    }else{
        document.getElementById("photosBtn").style.display="block";
    }
}

function openMsg(){
    document.querySelector("header").style.display="none";
    document.getElementById("msgSection").style.display="block";

    document.getElementById("music").play().catch(()=>{});

    typeWriter();
}

/* photos */
function openPhotos(){
    document.getElementById("gallery").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
