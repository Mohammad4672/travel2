<!DOCTYPE html>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUBA 💛</title>

<style>
body{
    margin:0;
    font-family:Tahoma, Arial;
    min-height:100vh;
    overflow-x:hidden;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,182,193,0.6), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,223,186,0.6), transparent 40%),
    linear-gradient(180deg, #0f0f1a, #1a1a2e);

    color:white;
}

/* header */
header{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

h1{
    font-size:30px;
    color:#ffb6c1;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#ff4da6,#ff7ac3);
    color:white;
    cursor:pointer;
    font-size:16px;
    margin:8px;
}

/* sections */
.section{
    padding:60px 20px;
    display:none;
    max-width:800px;
    margin:auto;
}

#text{
    white-space:pre-line;
    line-height:2.3;
    font-size:18px;
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
}

/* buttons area */
#photosBtn{
    display:none;
    margin-top:20px;
    text-align:center;
}

/* images hidden completely */
.gallery{
    display:none;
    padding:60px 20px;
    text-align:center;
}

.gallery img{
    width:min(90%,400px);
    border-radius:20px;
    margin:15px 0;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

/* nav */
nav{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:none;
}
</style>
</head>

<body>

<header>
    <h1>💛 إلى رُبى</h1>

    <!-- زر الرسالة -->
    <button onclick="openMsg()">💌 Open Message</button>
</header>

<!-- الرسالة -->
<div class="section" id="msgSection">
    <div id="text"></div>

    <!-- زر الصور (يظهر بعد الرسالة) -->
    <div id="photosBtn">
        <button onclick="openPhotos()">
            📸 تركتلك كم صورة إلي إذا يوم اشتقتيلي 💛
        </button>
    </div>
</div>

<!-- الصور (مخفية بالبداية) -->
<div class="gallery" id="gallery">
    <h2>💛 الصور</h2>
    <img src="image1.JPG">
    <img src="image2.JPG">
    <img src="image3.JPG">
    <img src="image4.jpg">
</div>

<audio id="music" loop>
    <source src="music.mp3">
</audio>

<script>

const msg = `رُبى…
ما بعرف إذا هالكلمات رح توصللك بنفس الشعور اللي جواتي، بس رح أكتبها كأنك عم تقريها بقلبي مش عالشاشة…
قبل ما سافر، حسّيت إنو في شي جواتي عم ينكسر بهدوء… مش لأن السفر صعب، بس لان وجودك هو الأمان نفسه.
إنتِ كنتي أكتر من شخص حلو بحياتي…
كنتِ راحة، وطمأنينة، وضحكة بتطلع بدون سبب، واشتياق حتى وإنتِ موجودة.
ما بعرف إذا رح تجمعنا الأيام مرة تانية أو لأ…
بس بعرف إنو في جزء مني رح يضل واقف عندك، مهما راحت المسافات.
إذا يوم حسّيتي إنو في شي ناقص، أو في لحظة هدوء غريبة… تذكري إنو في حدا بعيد، بس قلبه بعدو هون، عندك إنتِ.
أنا ما بعرف شو اسم هالشعور… بس بعرف إنه صادق.
وأكتر شي بيوجعني إني ما قلتلك كل شي بوقته.
إذا كان في رجعة…
بدي أرجع وأنا نفس الشخص، بس متأكد أكتر من شعوري فيكي 💛
وتأكدي رح تضل نفس اللهفة عندي تجاهك
ديري بالك عحالك يا قلبي وتأكدي
انو محمد قد ما كان بعيد قلبو واحساسو
رح يضلو عندك ورح يضل حدك 💛`;

function openMsg(){
    document.querySelector("header").style.display="none";
    document.getElementById("msgSection").style.display="block";

    document.getElementById("text").innerText = msg;

    document.getElementById("music").play().catch(()=>{});

    // يظهر زر الصور بعد الرسالة
    setTimeout(()=>{
        document.getElementById("photosBtn").style.display="block";
    }, 2000);
}

/* زر الصور */
function openPhotos(){
    document.getElementById("gallery").style.display="block";
    document.getElementById("gallery").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
